name: PR Smoke + Tests

# KAN-CI-WIREUP: this repo previously had no PR-trigger workflow — only a
# push-to-main deploy workflow (.github/workflows/deploy-http.yml). PRs
# landed with empty statusCheckRollup, meaning regressions could merge
# silently. This workflow runs an import smoke and the test suite on every
# PR against main so review has a real signal.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs when a new commit is pushed to the same PR.
concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  smoke-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # The repo splits requirements: requirements.txt is the stdio MCP
        # server (mcp_server.py) deps, requirements-http.txt is the FastAPI
        # bridge (http_server.py) deps. We need both for the smoke + tests:
        # tests import tools/intelligence.py (httpx) and the bridge import
        # smoke needs FastAPI, slowapi, etc.
        # pytest + pytest-asyncio are not pinned in the repo (no pyproject /
        # requirements-dev), so install them here. Tests use
        # @pytest.mark.asyncio with no asyncio_mode config, so pin
        # pytest-asyncio<0.23 to keep the legacy-mode default behaviour.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-http.txt
          pip install "pytest>=7.0" "pytest-asyncio<0.23"

      - name: Smoke — import FastAPI bridge app
        # The FastAPI app is `app` defined at module scope in http_server.py
        # (root of repo, not an `app/` package). Importing the module
        # exercises every tools/* import and the @app.get/@app.post route
        # registrations, which is enough to catch syntax errors, missing
        # symbols, and broken imports before tests run.
        env:
          # http_server.py reads these at import time but tolerates empty
          # values; set them so the smoke matches a typical runtime shape.
          REPORIUM_API_URL: http://localhost
          REPORIUM_APP_TOKEN: smoke
          MCP_SHARED_SECRET: smoke
        run: python -c "import http_server; assert http_server.app.title == 'Reporium MCP HTTP Bridge'; print('OK')"

      - name: Run pytest
        run: pytest tests/ -v
