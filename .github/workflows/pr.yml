name: PR Smoke + Tests

# KAN-CI-WIREUP: this repo previously had no PR-trigger workflow. This
# workflow runs an import smoke and the test suite on every PR against
# main so review has a real signal.
#
# Workato teardown 2026-05-20: the HTTP bridge (http_server.py /
# Dockerfile.http / deploy-http.yml) was removed; the stdio MCP server
# (mcp_server.py) is the only remaining entrypoint.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs when a new commit is pushed to the same PR.
concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  smoke-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # requirements.txt is the stdio MCP server (mcp_server.py) deps.
        # pytest + pytest-asyncio are not pinned in the repo (no pyproject /
        # requirements-dev), so install them here.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pytest>=7.0" "pytest-asyncio>=0.23"

      - name: Smoke — import stdio MCP server
        # mcp_server.py defines `app = Server("reporium")` at module scope.
        # Importing the module exercises every tools/* import and tool
        # registration, which catches syntax errors, missing symbols, and
        # broken imports before tests run.
        env:
          # mcp_server.py reads these at import time but tolerates empty
          # values; set them so the smoke matches a typical runtime shape.
          REPORIUM_API_URL: http://localhost
          REPORIUM_APP_TOKEN: smoke
        run: python -c "import mcp_server; assert mcp_server.app.name == 'reporium'; print('OK')"

      - name: Run pytest
        # PYTHONPATH=. makes `from tools.intelligence import ...` resolve to
        # the repo's tools/ package — pytest's rootdir auto-discovery doesn't
        # add the rootdir to sys.path on its own. The repo has no pyproject /
        # conftest / pytest.ini that would otherwise handle this; per
        # KAN-CI-WIREUP scope, fix it in the workflow rather than touching
        # non-workflow files.
        # --asyncio-mode=auto runs `@pytest.mark.asyncio` tests without
        # needing a config file (pytest-asyncio>=0.23 defaults to STRICT).
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --asyncio-mode=auto
