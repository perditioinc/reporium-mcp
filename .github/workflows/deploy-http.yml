name: Deploy MCP HTTP Bridge to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "http_server.py"
      - "tools/**"
      - "requirements*.txt"
      - "Dockerfile.http"
      - "cloudbuild.http.yaml"
      - ".github/workflows/deploy-http.yml"
  workflow_dispatch:

permissions:
  contents: read
  # id-token:write is required for Workload Identity Federation — GitHub Actions
  # mints a short-lived OIDC token that google-github-actions/auth exchanges for
  # a federated GCP access token. No long-lived JSON service-account key is
  # stored anywhere in this repo or in GitHub secrets.
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE: us-central1-docker.pkg.dev/perditio-platform/cloud-run-source-deploy/reporium-mcp-http:${{ github.sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: projects/573778300586/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: reporium-mcp-deploy@perditio-platform.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Build HTTP bridge image (docker build + push to Artifact Registry)
        # KAN-215: switched from `gcloud builds submit` to direct docker build/push.
        # `gcloud builds submit` requires the deploy SA to have project-level
        # roles/storage.admin (for Cloud Build's staging bucket access) — bucket-
        # scoped grants are not sufficient (verified empirically across 5 deploy
        # attempts during 8h-run on 2026-05-03; documented in KAN-210 comment).
        # Direct docker push only requires roles/artifactregistry.writer on the
        # AR repository — much narrower. Once this lands, KAN-210's storage.admin
        # removal can ship cleanly.
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          docker build -f Dockerfile.http -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522 # v2.7.6
        id: deploy
        with:
          service: reporium-mcp-http
          region: us-central1
          image: ${{ env.IMAGE }}
          # Dedicated minimal runtime SA. Replaces the default compute SA
          # (573778300586-compute@…) which carries project-wide roles/editor,
          # roles/run.admin, roles/storage.objectAdmin, etc. — far more than
          # an HTTP bridge that only reads 2 secrets and forwards traffic
          # needs. Bindings for this SA are documented in
          # docs/runtime-service-account.md.
          service_account: reporium-mcp-runtime@perditio-platform.iam.gserviceaccount.com
          env_vars: |-
            REPORIUM_API_URL=https://reporium-api-wypbzj5gpa-uc.a.run.app
          env_vars_update_strategy: merge
          flags: >-
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --concurrency=80
            --timeout=60
            --no-allow-unauthenticated
            --set-secrets=REPORIUM_APP_TOKEN=reporium-app-token:latest,MCP_SHARED_SECRET=reporium-mcp-token:latest

      # Unauthenticated reachability probe.  The service runs with
      # --no-allow-unauthenticated and roles/run.invoker is bound only to
      # workato-mcp@ (not to the deploy SA), so an authenticated probe would
      # require additional IAM setup.  A 401/403 from Cloud Run proves:
      #   (a) the service exists, (b) the container is up and routing, and
      #   (c) auth enforcement is working.  404/5xx would indicate the
      #   revision itself is broken and should fail the run.
      - name: Smoke test reachability and auth enforcement
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          echo "Checking ${SERVICE_URL}/health (expect 401/403 — auth enforced) ..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --http1.1 \
            "${SERVICE_URL}/health" --max-time 30)
          echo "HTTP status: $HTTP_CODE"
          case "$HTTP_CODE" in
            401|403)
              echo "MCP HTTP bridge reachable and auth enforced."
              ;;
            200)
              echo "::error::Unexpected 200 without auth — --no-allow-unauthenticated may not be applied."
              exit 1
              ;;
            *)
              echo "::error::Reachability check failed with HTTP $HTTP_CODE (expected 401/403)"
              exit 1
              ;;
          esac
